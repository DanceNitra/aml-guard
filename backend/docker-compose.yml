services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aml-guard-api
    ports:
      - "8222:8222"
    environment:
      - APP_NAME=AML Guard API
      - APP_VERSION=1.0.0
      - DEBUG=true
      - DATABASE_URL=sqlite+aiosqlite:///./data/aml_guard.db
      - SECRET_KEY=aml-guard-dev-secret-key-change-in-production-2026
      - CORS_ORIGINS=http://localhost:8000,https://dancenitra.github.io
    volumes:
      - ./data:/app/data
      - ./policies:/app/policies
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8222/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
