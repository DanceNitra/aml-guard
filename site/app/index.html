<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AML Guard — App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0e1a; --bg-card: #111827; --text: #e2e8f0; --text-muted: #94a3b8; --accent: #3b82f6; --green: #22c55e; --green-bg: rgba(34,197,94,0.1); --yellow: #eab308; --yellow-bg: rgba(234,179,8,0.1); --red: #ef4444; --red-bg: rgba(239,68,68,0.1); --border: #1e293b; --radius: 10px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }

    .loading-full { display: flex; min-height: 100vh; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .app-layout { display: flex; min-height: 100vh; }
    .sidebar { width: 230px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; }
    .sidebar-logo { font-size: 1.1rem; font-weight: 700; margin-bottom: 2rem; } .sidebar-logo span { color: var(--accent); }
    .sidebar-nav a { display: flex; align-items: center; gap: .7rem; padding: .7rem .8rem; border-radius: 8px; color: var(--text-muted); font-size: .9rem; margin-bottom: .2rem; }
    .sidebar-nav a:hover { background: rgba(59,130,246,0.1); color: var(--text); }
    .sidebar-nav a.active { background: rgba(59,130,246,0.15); color: var(--accent); font-weight: 600; }
    .sidebar-nav .sec { font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); padding: 1rem .8rem .3rem; opacity: .6; }
    .sidebar-nav #logout-btn { color: var(--red); margin-top: 1rem; }

    .main-content { margin-left: 230px; flex: 1; padding: 1.5rem 2rem; max-width: 1100px; }

    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .top-bar h1 { font-size: 1.4rem; font-weight: 700; }
    .top-bar .info { font-size: .85rem; color: var(--text-muted); text-align: right; }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .card-h h2 { font-size: 1.1rem; font-weight: 600; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; text-align: center; }
    .stat-card .val { font-size: 1.8rem; font-weight: 700; }
    .stat-card .lbl { font-size: .8rem; color: var(--text-muted); margin-top: .2rem; }
    .stat-card .ico { font-size: 1.5rem; margin-bottom: .5rem; }

    .btn { display: inline-flex; align-items: center; gap: .5rem; padding: .7rem 1.4rem; border-radius: 6px; font-weight: 600; font-size: .9rem; cursor: pointer; border: none; transition: all .2s; }
    .btn-primary { background: var(--accent); color: white; } .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #1e293b; color: var(--text); border: 1px solid var(--border); } .btn-secondary:hover { background: #334155; }
    .btn-group { display: flex; gap: .7rem; flex-wrap: wrap; margin-top: 1rem; }
    .btn-sm { padding: .4rem .8rem; font-size: .8rem; }

    .badge { display: inline-flex; padding: .15rem .5rem; border-radius: 10px; font-size: .75rem; font-weight: 600; }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-red { background: var(--red-bg); color: var(--red); }
    .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
    .badge-blue { background: rgba(59,130,246,0.1); color: var(--accent); }

    .score-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; margin: 0 auto .5rem; }
    .score-circle.good { background: var(--green-bg); color: var(--green); border: 3px solid var(--green); }
    .score-circle.ok { background: var(--yellow-bg); color: var(--yellow); border: 3px solid var(--yellow); }
    .score-circle.bad { background: var(--red-bg); color: var(--red); border: 3px solid var(--red); }

    .checklist { list-style: none; }
    .checklist li { padding: .5rem 0; display: flex; align-items: center; gap: .7rem; border-bottom: 1px solid rgba(255,255,255,.03); }
    .checklist li:last-child { border-bottom: none; }
    .checklist .check.done { color: var(--green); }
    .checklist .check.miss { color: var(--text-muted); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th { text-align: left; padding: .7rem .8rem; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); font-size: .8rem; }
    td { padding: .7rem .8rem; border-bottom: 1px solid rgba(255,255,255,.03); }
    tr:hover td { background: rgba(59,130,246,.03); }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 500; margin-bottom: .4rem; font-size: .9rem; }
    .form-group .hint { font-size: .8rem; color: var(--text-muted); margin-bottom: .4rem; }
    input, textarea, select { width: 100%; padding: .7rem .9rem; background: #0f172a; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: .9rem; font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .page { display: none; }
    .page.active { display: block; }

    pre.policy-text { background: #0f172a; padding: 1rem; border-radius: 8px; font-size: .8rem; line-height: 1.4; max-height: 400px; overflow-y: auto; white-space: pre-wrap; color: #cbd5e1; }
    .status-bar { background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2); border-radius: 8px; padding: .5rem .8rem; font-size: .8rem; color: var(--text-muted); margin-bottom: 1.5rem; display: flex; justify-content: space-between; }
    .status-bar strong { color: var(--accent); }

    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 1rem; } .stats-grid { grid-template-columns: repeat(2, 1fr); } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div id="checking" class="loading-full">
  <div class="spinner"></div>
  <p style="color:var(--text-muted);">Prihlasujem...</p>
</div>

<div id="app-shell" style="display:none;">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><span>🛡️</span> AML <span>Guard</span></div>
      <nav class="sidebar-nav">
        <a href="#" data-page="dashboard" class="active">📊 Dashboard</a>
        <div class="sec">Dokumenty</div>
        <a href="#" data-page="policy">📋 AML politika</a>
        <div class="sec">Previerky</div>
        <a href="#" data-page="cdd">🪪 KYC / CDD</a>
        <a href="#" data-page="ubo">🏛️ Register UBO</a>
        <div class="sec">Reportovanie</div>
        <a href="#" data-page="str">🚨 Podozrivé obchody</a>
        <div class="sec">Compliance</div>
        <a href="#" data-page="training">🎓 Školenia</a>
        <div class="sec">Nastavenia</div>
        <a href="#" data-page="settings">⚙️ Nastavenia</a>
        <a href="#" id="logout-btn">🚪 Odhlásiť</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="top-bar">
        <h1 id="page-title">Dashboard</h1>
        <div class="info">
          <div id="user-name">—</div>
          <div id="company-name" style="font-size:.8rem;opacity:.7;">—</div>
        </div>
      </div>

      <div id="page-dashboard" class="page active"></div>
      <div id="page-policy" class="page"></div>
      <div id="page-cdd" class="page"></div>
      <div id="page-ubo" class="page"></div>
      <div id="page-str" class="page"></div>
      <div id="page-training" class="page"></div>
      <div id="page-settings" class="page"></div>
    </main>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
// ─── APP STATE ───
let currentPage = 'dashboard';
let userData = null;

// ─── AUTH CHECK ───
(async function() {
  const token = API.token;
  if (!token) { window.location.href = 'login.html'; return; }
  
  try {
    userData = await API.auth.me();
    document.getElementById('checking').style.display = 'none';
    document.getElementById('app-shell').style.display = 'block';
    document.getElementById('user-name').textContent = userData.user.full_name;
    document.getElementById('company-name').textContent = userData.company?.name || '';
    setupNav();
    showPage('dashboard');
  } catch(e) {
    console.error('Auth failed:', e);
    API.token = null;
    window.location.href = 'login.html';
  }
})();

function setupNav() {
  document.querySelectorAll('.sidebar-nav a[data-page]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      showPage(el.dataset.page);
    });
  });
  document.getElementById('logout-btn').addEventListener('click', e => {
    e.preventDefault();
    API.auth.logout();
    window.location.href = 'login.html';
  });
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar-nav a[data-page]').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  const titles = { dashboard:'Dashboard', policy:'AML politika', cdd:'KYC / CDD', ubo:'Register UBO', str:'Podozrivé obchody', training:'Školenia', settings:'Nastavenia' };
  document.getElementById('page-title').textContent = titles[page] || 'Dashboard';
  document.getElementById(`page-${page}`).classList.add('active');
  
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'policy': renderPolicyPage(); break;
    case 'cdd': renderCDDPage(); break;
    case 'ubo': renderUBOPage(); break;
    case 'str': renderSTRPage(); break;
    case 'training': renderTrainingPage(); break;
    case 'settings': renderSettingsPage(); break;
  }
}

// ─── DASHBOARD ───
async function renderDashboard() {
  try { userData = await API.auth.me(); } catch(e) {}
  const d = userData.dashboard;
  const c = userData.company;
  
  const scoreClass = d.compliance_score >= 80 ? 'good' : d.compliance_score >= 50 ? 'ok' : 'bad';
  const scoreEmoji = d.compliance_score >= 80 ? '🟢' : d.compliance_score >= 50 ? '🟡' : '🔴';
  
  document.getElementById('page-dashboard').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="ico">📋</div><div class="val">${d.stats.policies ? '✅' : '❌'}</div><div class="lbl">AML politika</div></div>
      <div class="stat-card"><div class="ico">🪪</div><div class="val">${d.stats.cdd_records}</div><div class="lbl">KYC záznamov</div></div>
      <div class="stat-card"><div class="ico">🏛️</div><div class="val">${d.stats.ubo_records}</div><div class="lbl">UBO záznamov</div></div>
      <div class="stat-card"><div class="ico">${d.stats.training_valid ? '✅' : '⚠️'}</div><div class="val">${d.stats.training_valid ? 'OK' : 'Chýba'}</div><div class="lbl">Školenie</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
      <div class="card" style="text-align:center;">
        <h2 style="margin-bottom:1rem;">${scoreEmoji} Compliance Score</h2>
        <div class="score-circle ${scoreClass}">${d.compliance_score}%</div>
        <p style="color:var(--text-muted);font-size:.85rem;">
          ${d.compliance_score === 100 ? 'Všetko v poriadku.' : d.compliance_score >= 80 ? 'Dobrý stav.' : d.compliance_score >= 50 ? 'Niektoré veci chýbajú.' : 'Viaceré povinnosti nie sú splnené.'}
        </p>
      </div>
      <div class="card">
        <h2 style="margin-bottom:1rem;">📌 Čo treba</h2>
        <ul class="checklist">
          ${d.checklist.map(x => `<li><span class="check ${x.done ? 'done' : 'miss'}">${x.done ? '✓' : '○'}</span><span>${x.done ? '✅ ' : ''}${x.item}</span></li>`).join('')}
        </ul>
      </div>
    </div>
    <div class="card" style="margin-top:1rem;">
      <h2 style="margin-bottom:.8rem;">⚡ Rýchle akcie</h2>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="showPage('policy')">📋 ${d.stats.policies ? 'Upraviť' : 'Vytvoriť'} AML politiku</button>
        <button class="btn btn-secondary" onclick="showPage('cdd')">🪪 Nová KYC previerka</button>
        <button class="btn btn-secondary" onclick="showPage('training')">🎓 Školenie</button>
      </div>
    </div>
  `;
}

// ─── POLICY PAGE ───
async function renderPolicyPage() {
  const el = document.getElementById('page-policy');
  try {
    const data = await API.policy.list();
    if (data.policies.length > 0) {
      const p = data.policies[0];
      el.innerHTML = `
        <div class="status-bar"><span>✅ Aktívna politika od ${new Date(p.created_at).toLocaleDateString('sk-SK')}</span><strong>v.${p.version}</strong></div>
        <div class="card">
          <div class="card-h"><h2>📋 AML politika</h2><button class="btn btn-sm btn-primary" onclick="generatePolicyForm()">+ Nová verzia</button></div>
          <p style="color:var(--text-muted);margin-bottom:1rem;">Aktívna politika je platná do ${new Date(p.valid_until).toLocaleDateString('sk-SK')}.</p>
          <div class="btn-group">
            <button class="btn btn-secondary btn-sm" onclick="generatePolicyForm()">📝 Upraviť</button>
            <button class="btn btn-secondary btn-sm" onclick="if(confirm('PDF report bol vygenerovaný na serveri.')){}">📥 Stiahnuť PDF</button>
          </div>
        </div>
      `;
    } else {
      generatePolicyForm();
    }
  } catch(e) {
    el.innerHTML = `<div class="card"><p style="color:var(--red);">Chyba: ${e.message}</p></div>`;
  }
}

function generatePolicyForm() {
  const el = document.getElementById('page-policy');
  const c = userData.company;
  el.innerHTML = `
    <div class="card">
      <div class="card-h"><h2>📝 Generovať AML politiku</h2></div>
      <div class="form-group"><label>Názov spoločnosti</label><input id="gp_name" value="${c?.name || ''}"></div>
      <div class="form-row">
        <div class="form-group"><label>IČO</label><input id="gp_ico" value="${c?.ico || ''}"></div>
        <div class="form-group"><label>Počet zamestnancov</label><input id="gp_emp" value="${c?.employee_count || 1}"></div>
      </div>
      <div class="form-group"><label>Zodpovedná osoba</label><input id="gp_co" value="${userData.user.full_name}"></div>
      <div class="form-group"><label>Kontakt (CO)</label><input id="gp_contact" value="${userData.user.email}"></div>
      <div class="form-row">
        <div class="form-group"><label>Typ činnosti</label><select id="gp_type"><option value="realestate">Realitná kancelária</option><option value="accounting">Účtovná firma</option><option value="auto">Predajca áut</option></select></div>
        <div class="form-group"><label>Miera rizika</label><select id="gp_risk"><option value="low">Nízka</option><option value="medium">Stredná</option><option value="high">Vysoká</option></select></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="doGeneratePolicy()">📄 Vygenerovať</button>
        <button class="btn btn-secondary" onclick="showPage('policy')">← Späť</button>
      </div>
    </div>
  `;
}

async function doGeneratePolicy() {
  const btn = document.querySelector('#page-policy .btn-primary');
  btn.disabled = true; btn.innerHTML = 'Generujem...';
  
  try {
    const result = await API.policy.generate({
      company_name: document.getElementById('gp_name').value,
      ico: document.getElementById('gp_ico').value,
      business_type: document.getElementById('gp_type').value,
      employee_count: document.getElementById('gp_emp').value,
      co_name: document.getElementById('gp_co').value,
      co_contact: document.getElementById('gp_contact').value,
      risk_level: document.getElementById('gp_risk').value,
    });
    
    document.getElementById('page-policy').innerHTML = `
      <div class="status-bar" style="border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08);"><span>✅ Politika vygenerovaná</span><strong>v.${result.version}</strong></div>
      <div class="card">
        <h2 style="margin-bottom:1rem;">📄 AML politika — náhľad</h2>
        <div class="policy-text">${result.policy_text.replace(/\n/g, '<br>')}</div>
        <div class="btn-group" style="margin-top:1rem;">
          <button class="btn btn-primary" onclick="showPage('policy')">← Späť na prehľad</button>
          <button class="btn btn-secondary" onclick="showPage('dashboard')">📊 Dashboard</button>
        </div>
      </div>
    `;
  } catch(e) {
    alert('Chyba: ' + e.message);
    btn.disabled = false; btn.innerHTML = 'Vygenerovať';
  }
}

// ─── CDD PAGE ───
async function renderCDDPage() {
  const el = document.getElementById('page-cdd');
  try {
    const data = await API.cdd.list();
    let rows = '';
    (data.records || []).forEach(r => {
      const riskBadge = r.risk_level === 'low' ? 'badge-green' : r.risk_level === 'medium' ? 'badge-yellow' : 'badge-red';
      rows += `<tr><td>${r.first_name || ''} ${r.last_name}</td><td>${r.id_document_type || '-'}</td><td><span class="badge ${riskBadge}">${r.risk_level}</span>${r.is_pep ? ' <span class="badge badge-yellow">PEP</span>' : ''}</td><td><span class="badge ${r.id_verified ? 'badge-green' : 'badge-yellow'}">${r.id_verified ? 'Overené' : 'Neoverené'}</span></td><td>${new Date(r.created_at).toLocaleDateString('sk-SK')}</td></tr>`;
    });
    el.innerHTML = `
      <div class="card">
        <div class="card-h"><h2>🪪 KYC / CDD previerky</h2><button class="btn btn-sm btn-primary" onclick="showCDDForm()">+ Nová</button></div>
        ${data.records.length === 0 ? '<p style="color:var(--text-muted);">Zatiaľ žiadne záznamy.</p>' : `<div class="table-wrap"><table><thead><tr><th>Meno</th><th>Doklad</th><th>Riziko</th><th>Stav</th><th>Dátum</th></tr></thead><tbody>${rows}</tbody></table></div>`}
      </div>
    `;
  } catch(e) { el.innerHTML = `<div class="card"><p style="color:var(--red);">Chyba: ${e.message}</p></div>`; }
}

function showCDDForm() {
  const el = document.getElementById('page-cdd');
  el.innerHTML = `
    <div class="card">
      <div class="card-h"><h2>🪪 Nová KYC previerka</h2></div>
      <div class="form-row">
        <div class="form-group"><label>Meno</label><input id="cdd_fn" placeholder="Peter"></div>
        <div class="form-group"><label>Priezvisko</label><input id="cdd_ln" placeholder="Vzorový"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Štátna príslušnosť</label><input id="cdd_nat" value="SK"></div>
        <div class="form-group"><label>Dátum nar.</label><input id="cdd_bd" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Typ dokladu</label><select id="cdd_doc"><option value="obciansky">Občiansky preukaz</option><option value="pas">Cestovný pas</option></select></div>
        <div class="form-group"><label>Číslo dokladu</label><input id="cdd_docnum"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Riziko</label><select id="cdd_risk"><option value="low">Nízke</option><option value="medium">Stredné</option><option value="high">Vysoké</option></select></div>
        <div class="form-group"><label>PEP osoba?</label><select id="cdd_pep"><option value="false">Nie</option><option value="true">Áno</option></select></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="doCreateCDD()">💾 Uložiť</button>
        <button class="btn btn-secondary" onclick="showPage('cdd')">← Späť</button>
      </div>
    </div>
  `;
}

async function doCreateCDD() {
  try {
    await API.cdd.create({
      last_name: document.getElementById('cdd_ln').value,
      first_name: document.getElementById('cdd_fn').value,
      nationality: document.getElementById('cdd_nat').value,
      birth_date: document.getElementById('cdd_bd').value || '',
      id_document_type: document.getElementById('cdd_doc').value,
      id_document_number: document.getElementById('cdd_docnum').value,
      risk_level: document.getElementById('cdd_risk').value,
      is_pep: document.getElementById('cdd_pep').value === 'true',
    });
    showPage('cdd');
  } catch(e) { alert('Chyba: ' + e.message); }
}

// ─── UBO PAGE ───
async function renderUBOPage() {
  const el = document.getElementById('page-ubo');
  try {
    const data = await API.ubo.list();
    let rows = '';
    (data.records || []).forEach(r => {
      rows += `<tr><td>${r.full_name}</td><td>${r.nationality || '-'}</td><td><strong>${r.ownership_percent}%</strong></td><td>${r.ownership_type === 'direct' ? 'Priame' : 'Nepriame'}</td><td>${r.is_statutory ? '<span class="badge badge-blue">Štatutár</span>' : '-'}</td></tr>`;
    });
    el.innerHTML = `
      <div class="card">
        <div class="card-h"><h2>🏛️ Register UBO</h2><button class="btn btn-sm btn-primary" onclick="showUBOForm()">+ Pridať</button></div>
        ${data.records.length === 0 ? '<p style="color:var(--text-muted);">Zatiaľ žiadne záznamy.</p>' : `<div class="table-wrap"><table><thead><tr><th>Meno</th><th>Štát</th><th>Podiel</th><th>Typ</th><th>Štatút</th></tr></thead><tbody>${rows}</tbody></table></div>`}
        <p style="font-size:.85rem;color:var(--text-muted);margin-top:1rem;">ℹ️ Pravidlo 25%: evidujú sa osoby s viac ako 25% podielom.</p>
      </div>
    `;
  } catch(e) { el.innerHTML = `<div class="card"><p style="color:var(--red);">Chyba: ${e.message}</p></div>`; }
}

function showUBOForm() {
  const el = document.getElementById('page-ubo');
  el.innerHTML = `
    <div class="card">
      <div class="card-h"><h2>🏛️ Nový UBO záznam</h2></div>
      <div class="form-group"><label>Celé meno</label><input id="ubo_name" placeholder="Meno Priezvisko"></div>
      <div class="form-row">
        <div class="form-group"><label>Podiel (%)</label><input id="ubo_pct" type="number" step="0.01"></div>
        <div class="form-group"><label>Štát</label><input id="ubo_nat" value="SK"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Typ vlastníctva</label><select id="ubo_type"><option value="direct">Priame</option><option value="indirect">Nepriame</option></select></div>
        <div class="form-group"><label>Štatutár?</label><select id="ubo_stat"><option value="false">Nie</option><option value="true">Áno</option></select></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="doCreateUBO()">💾 Uložiť</button>
        <button class="btn btn-secondary" onclick="showPage('ubo')">← Späť</button>
      </div>
    </div>
  `;
}

async function doCreateUBO() {
  try {
    await API.ubo.create({
      full_name: document.getElementById('ubo_name').value,
      ownership_percent: parseFloat(document.getElementById('ubo_pct').value),
      nationality: document.getElementById('ubo_nat').value,
      ownership_type: document.getElementById('ubo_type').value,
      is_statutory: document.getElementById('ubo_stat').value === 'true',
    });
    showPage('ubo');
  } catch(e) { alert('Chyba: ' + e.message); }
}

// ─── STR PAGE ───
async function renderSTRPage() {
  const el = document.getElementById('page-str');
  try {
    const data = await API.str.list();
    let rows = '';
    (data.reports || []).forEach(r => {
      rows += `<tr><td><strong>${r.report_number}</strong></td><td>${r.transaction_amount ? parseFloat(r.transaction_amount).toLocaleString('sk-SK') + ' €' : '-'}</td><td>${r.transaction_type || '-'}</td><td><span class="badge ${r.status === 'submitted' ? 'badge-green' : 'badge-yellow'}">${r.status === 'submitted' ? 'Odoslané' : 'Koncept'}</span></td></tr>`;
    });
    el.innerHTML = `
      <div class="card">
        <div class="card-h"><h2>🚨 Podozrivé obchody</h2><button class="btn btn-sm btn-primary" onclick="showSTRForm()">+ Nové</button></div>
        ${data.reports.length === 0 ? '<p style="color:var(--text-muted);">Zatiaľ žiadne hlásenia.</p>' : `<div class="table-wrap"><table><thead><tr><th>Číslo</th><th>Suma</th><th>Typ</th><th>Stav</th></tr></thead><tbody>${rows}</tbody></table></div>`}
      </div>
    `;
  } catch(e) { el.innerHTML = `<div class="card"><p style="color:var(--red);">Chyba: ${e.message}</p></div>`; }
}

function showSTRForm() {
  const el = document.getElementById('page-str');
  el.innerHTML = `
    <div class="card">
      <div class="card-h"><h2>🚨 Nové hlásenie</h2></div>
      <div class="form-row">
        <div class="form-group"><label>Suma (€)</label><input id="str_amount" type="number"></div>
        <div class="form-group"><label>Dátum transakcie</label><input id="str_date" type="date"></div>
      </div>
      <div class="form-group"><label>Typ transakcie</label><select id="str_type"><option value="cash">Hotovosť</option><option value="transfer">Bankový prevod</option><option value="crypto">Crypto</option></select></div>
      <div class="form-group"><label>Popis podozrenia</label><textarea id="str_desc" rows="4" placeholder="Popíšte prečo je táto transakcia podozrivá..."></textarea></div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="doCreateSTR()">💾 Uložiť</button>
        <button class="btn btn-secondary" onclick="showPage('str')">← Späť</button>
      </div>
    </div>
  `;
}

async function doCreateSTR() {
  try {
    await API.str.create({
      transaction_amount: parseFloat(document.getElementById('str_amount').value) || null,
      transaction_date: document.getElementById('str_date').value || '',
      transaction_type: document.getElementById('str_type').value,
      description: document.getElementById('str_desc').value,
      suspicion_reasons: [],
    });
    showPage('str');
  } catch(e) { alert('Chyba: ' + e.message); }
}

// ─── TRAINING PAGE ───
async function renderTrainingPage() {
  const el = document.getElementById('page-training');
  try {
    const data = await API.training.list();
    let rows = '';
    (data.records || []).forEach(r => {
      const valid = new Date(r.valid_until) > new Date();
      rows += `<tr><td>${r.module_name}</td><td>${r.training_type === 'annual' ? 'Ročné' : 'Vstupné'}</td><td>${new Date(r.completed_at).toLocaleDateString('sk-SK')}</td><td>${r.score}%</td><td><span class="badge ${valid ? 'badge-green' : 'badge-red'}">${valid ? 'Platné' : 'Expirované'}</span></td></tr>`;
    });
    el.innerHTML = `
      <div class="card">
        <div class="card-h"><h2>🎓 AML školenia</h2><button class="btn btn-sm btn-primary" onclick="completeTraining()">+ Absolvovať školenie</button></div>
        <p style="color:var(--text-muted);margin-bottom:1rem;font-size:.9rem;">Podľa AML zákona je každý zamestnanec povinný absolvovať ročné školenie.</p>
        ${data.records.length === 0 ? '<p style="color:var(--text-muted);">Zatiaľ žiadne školenia.</p>' : `<div class="table-wrap"><table><thead><tr><th>Modul</th><th>Typ</th><th>Dátum</th><th>Skóre</th><th>Platnosť</th></tr></thead><tbody>${rows}</tbody></table></div>`}
      </div>
    `;
  } catch(e) { el.innerHTML = `<div class="card"><p style="color:var(--red);">Chyba: ${e.message}</p></div>`; }
}

async function completeTraining() {
  try {
    await API.training.complete({ module_name: 'Základné AML školenie ' + new Date().getFullYear(), score: 100 });
    showPage('training');
  } catch(e) { alert('Chyba: ' + e.message); }
}

// ─── SETTINGS PAGE ───
function renderSettingsPage() {
  const u = userData.user;
  const c = userData.company;
  document.getElementById('page-settings').innerHTML = `
    <div class="card">
      <h2 style="margin-bottom:1rem;">⚙️ Nastavenia</h2>
      <div class="form-row">
        <div class="form-group"><label>Meno</label><input value="${u.full_name}" disabled style="opacity:.6;"></div>
        <div class="form-group"><label>Email</label><input value="${u.email}" disabled style="opacity:.6;"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Firma</label><input value="${c?.name || ''}" disabled style="opacity:.6;"></div>
        <div class="form-group"><label>IČO</label><input value="${c?.ico || ''}" disabled style="opacity:.6;"></div>
      </div>
      <p style="font-size:.85rem;color:var(--text-muted);margin-top:1rem;">ℹ️ Úprava nastavení bude dostupná v ďalšej verzii.</p>
    </div>
  `;
}
</script>
</body>
</html>
