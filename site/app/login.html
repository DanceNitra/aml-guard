<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AML Guard — Prihlásenie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0e1a; --bg-card: #111827; --text: #e2e8f0; --text-muted: #94a3b8; --accent: #3b82f6; --border: #1e293b; --radius: 12px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .auth-page { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 1.5rem; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; max-width: 420px; width: 100%; }
    .logo { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
    .logo span { color: var(--accent); }
    .subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    .tab { flex: 1; text-align: center; padding: 0.8rem; cursor: pointer; color: var(--text-muted); font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .auth-tab-content { display: none; }
    .auth-tab-content.active { display: block; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 0.4rem; font-size: 0.9rem; }
    input { width: 100%; padding: 0.7rem 0.9rem; background: #0f172a; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9rem; transition: border-color 0.2s; font-family: inherit; }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.4rem; border-radius: 6px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; border: none; justify-content: center; }
    .btn-primary { background: var(--accent); color: white; width: 100%; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .error.show { display: block; }
    .success { color: #22c55e; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .success.show { display: block; }
    .server-status { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-muted); text-align: center; }
    .load { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width:640px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="logo"><span>🛡️</span> AML <span>Guard</span></div>
    <p class="subtitle">AML Compliance pre SK/CZ firmy</p>
    
    <div class="server-status" id="server-status">🔌 Zisťujem pripojenie na server...</div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Prihlásenie</div>
      <div class="tab" onclick="switchTab('register')">Registrácia</div>
    </div>
    
    <div class="auth-tab-content active" id="tab-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="vas@email.sk">
      </div>
      <div class="form-group">
        <label>Heslo</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <div class="error" id="login-error"></div>
      <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Prihlásiť sa</button>
      <p style="text-align:center;margin-top:1rem;color:var(--text-muted);font-size:0.85rem;"><a href="../index.html">← Späť</a></p>
    </div>
    
    <div class="auth-tab-content" id="tab-register">
      <div class="form-group"><label>Meno</label><input type="text" id="reg-name" placeholder="Ján Demovič"></div>
      <div class="form-group"><label>Názov firmy</label><input type="text" id="reg-company" placeholder="Moja firma s.r.o."></div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="vas@email.sk"></div>
        <div class="form-group"><label>Heslo (min 6)</label><input type="password" id="reg-password" placeholder="••••••••"></div>
      </div>
      <div class="error" id="register-error"></div>
      <div class="success" id="register-success"></div>
      <button class="btn btn-primary" id="register-btn" onclick="handleRegister()">Vytvoriť účet</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
// Check server status on load
(async function() {
  const statusEl = document.getElementById('server-status');
  try {
    const r = await fetch('http://localhost:8222/api/health');
    const d = await r.json();
    statusEl.innerHTML = `✅ Server beží — ${d.app} v${d.version}`;
    statusEl.style.borderColor = 'rgba(34,197,94,0.3)';
    statusEl.style.background = 'rgba(34,197,94,0.1)';
  } catch(e) {
    statusEl.innerHTML = '⚠️ Server nie je spustený. Spustite: <code>uvicorn app.main:app --port 8222</code>';
    statusEl.style.borderColor = 'rgba(239,68,68,0.3)';
    statusEl.style.background = 'rgba(239,68,68,0.1)';
  }
})();

// Auto-switch to register tab
if (window.location.search.includes('signup=true')) {
  switchTab('register');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  hideErrors();
}

function hideErrors() {
  document.querySelectorAll('.error').forEach(e => e.classList.remove('show'));
  document.querySelectorAll('.success').forEach(e => e.classList.remove('show'));
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  
  hideErrors();
  if (!email || !password) { errorEl.textContent = 'Vyplňte email a heslo.'; errorEl.classList.add('show'); return; }
  
  btn.disabled = true; btn.innerHTML = '<span class="load"></span> Prihlasujem...';
  
  try {
    const result = await API.auth.login(email, password);
    window.location.href = 'index.html';
  } catch(e) {
    errorEl.textContent = e.message === 'Invalid email or password' ? 'Nesprávny email alebo heslo.' : e.message;
    errorEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Prihlásiť sa';
  }
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const company = document.getElementById('reg-company').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errorEl = document.getElementById('register-error');
  const successEl = document.getElementById('register-success');
  const btn = document.getElementById('register-btn');
  
  hideErrors();
  if (!name || !email || !password) { errorEl.textContent = 'Vyplňte meno, email a heslo.'; errorEl.classList.add('show'); return; }
  if (password.length < 6) { errorEl.textContent = 'Heslo musí mať aspoň 6 znakov.'; errorEl.classList.add('show'); return; }
  
  btn.disabled = true; btn.innerHTML = '<span class="load"></span> Vytváram účet...';
  
  try {
    const result = await API.auth.register({
      email, password, full_name: name,
      company_name: company, jurisdiction: 'SK', company_type: 'other'
    });
    API.token = result.access_token;
    successEl.textContent = 'Účet vytvorený! Presmerúvam...';
    successEl.classList.add('show');
    setTimeout(() => window.location.href = 'index.html', 1000);
  } catch(e) {
    errorEl.textContent = e.message;
    errorEl.classList.add('show');
    btn.disabled = false; btn.textContent = 'Vytvoriť účet';
  }
}
</script>
</body>
</html>
