<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AML Guard — Prihlásenie</title>
  <link rel="stylesheet" href="../css/app.css">
  <style>
    body { background: #0a0e1a; }
    .auth-page { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 1.5rem; }
    .auth-card { background: #111827; border: 1px solid #1e293b; border-radius: 12px; padding: 2.5rem; max-width: 420px; width: 100%; }
    .auth-card .logo { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
    .auth-card .logo span { color: #3b82f6; }
    .auth-card .subtitle { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
    .auth-card .tabs { display: flex; border-bottom: 1px solid #1e293b; margin-bottom: 1.5rem; }
    .auth-card .tab { flex: 1; text-align: center; padding: 0.8rem; cursor: pointer; color: #94a3b8; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .auth-card .tab:hover { color: #e2e8f0; }
    .auth-card .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }
    .auth-tab-content { display: none; }
    .auth-tab-content.active { display: block; }
    .auth-card .error { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .auth-card .error.show { display: block; }
    .auth-card .success { color: #22c55e; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .auth-card .success.show { display: block; }
    .demo-note {
      background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px; padding: 0.8rem 1rem; margin-bottom: 1.5rem;
      font-size: 0.85rem; color: #94a3b8; text-align: center;
    }
    .demo-note strong { color: #e2e8f0; }
    .loading-spinner { width: 20px; height: 20px; border: 2px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="logo"><span>🛡️</span> AML <span>Guard</span></div>
    <p class="subtitle">AML Compliance pre SK/CZ firmy</p>
    
    <div class="demo-note">
      🎯 Demo režim — použite <strong>demo@amlguard.sk</strong> / <strong>demo1234</strong>
    </div>
    
    <div class="tabs">
      <div class="tab active" data-tab="login" onclick="switchTab('login')">Prihlásenie</div>
      <div class="tab" data-tab="register" onclick="switchTab('register')">Registrácia</div>
    </div>
    
    <!-- LOGIN FORM -->
    <div class="auth-tab-content active" id="tab-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="vas@email.sk" value="demo@amlguard.sk">
      </div>
      <div class="form-group">
        <label>Heslo</label>
        <input type="password" id="login-password" placeholder="••••••••" value="demo1234">
      </div>
      <div class="error" id="login-error"></div>
      <button class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;" onclick="handleLogin()">
        Prihlásiť sa
      </button>
      <p style="text-align: center; margin-top: 1rem; color: #94a3b8; font-size: 0.85rem;">
        <a href="../index.html" style="color: #3b82f6;">← Späť na hlavnú stránku</a>
      </p>
    </div>
    
    <!-- REGISTER FORM -->
    <div class="auth-tab-content" id="tab-register">
      <div class="form-group">
        <label>Meno a priezvisko</label>
        <input type="text" id="reg-name" placeholder="Ján Demovič">
      </div>
      <div class="form-group">
        <label>Názov firmy</label>
        <input type="text" id="reg-company" placeholder="Moja firma s.r.o.">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="vas@email.sk">
        </div>
        <div class="form-group">
          <label>Heslo</label>
          <input type="password" id="reg-password" placeholder="min. 6 znakov">
        </div>
      </div>
      <div class="error" id="register-error"></div>
      <div class="success" id="register-success"></div>
      <button class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 0.5rem;" onclick="handleRegister()">
        Vytvoriť účet
      </button>
    </div>
  </div>
</div>

<script src="../js/supabase-mock.js"></script>
<script>
// Auto-switch to register tab if ?signup=true
if (window.location.search.includes('signup=true')) {
  switchTab('register');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('register-error').classList.remove('show');
  document.getElementById('register-success').classList.remove('show');
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  
  if (!email || !password) {
    errorEl.textContent = 'Vyplňte email a heslo.';
    errorEl.classList.add('show');
    return;
  }
  
  const btn = document.querySelector('#tab-login .btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> Prihlasujem...';
  errorEl.classList.remove('show');
  
  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    
    if (error) {
      errorEl.textContent = error.message === 'Invalid login credentials' 
        ? 'Nesprávny email alebo heslo.'
        : error.message;
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Prihlásiť sa';
      return;
    }
    
    // Redirect to app
    window.location.href = 'index.html';
  } catch(e) {
    errorEl.textContent = 'Chyba pri prihlasovaní. Skúste znova.';
    errorEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Prihlásiť sa';
  }
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const company = document.getElementById('reg-company').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errorEl = document.getElementById('register-error');
  const successEl = document.getElementById('register-success');
  
  if (!name || !email || !password) {
    errorEl.textContent = 'Vyplňte meno, email a heslo.';
    errorEl.classList.add('show');
    successEl.classList.remove('show');
    return;
  }
  
  if (password.length < 6) {
    errorEl.textContent = 'Heslo musí mať aspoň 6 znakov.';
    errorEl.classList.add('show');
    successEl.classList.remove('show');
    return;
  }
  
  const btn = document.querySelector('#tab-register .btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> Vytváram účet...';
  errorEl.classList.remove('show');
  successEl.classList.remove('show');
  
  try {
    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: {
        data: {
          full_name: name,
          company: company
        }
      }
    });
    
    if (error) {
      errorEl.textContent = error.message === 'User already registered'
        ? 'Tento email je už zaregistrovaný. Prihláste sa.'
        : error.message;
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Vytvoriť účet';
      return;
    }
    
    // Also create profile and company
    if (data?.user) {
      const companyId = crypto.randomUUID ? crypto.randomUUID() : 'cmp-' + Date.now();
      
      await supabase.from('companies').insert({
        id: companyId,
        name: company || `${name}'s Company`,
        jurisdiction: 'SK',
        company_type: 'realestate',
        employee_count: 1
      });
      
      await supabase.from('profiles').insert({
        id: data.user.id,
        full_name: name,
        email: email,
        company_name: company || '',
        company_id: companyId,
        company_type: 'realestate',
        employee_count: 1,
        jurisdiction: 'SK'
      });
    }
    
    successEl.textContent = 'Účet vytvorený! Presmerúvam do aplikácie...';
    successEl.classList.add('show');
    
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);
  } catch(e) {
    errorEl.textContent = 'Chyba pri registrácii. Skúste znova.';
    errorEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Vytvoriť účet';
  }
}
</script>
</body>
</html>
